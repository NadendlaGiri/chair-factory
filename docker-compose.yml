version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chairfactory_db
    environment:
      POSTGRES_DB: chairfactory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chairfactory_server
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chairfactory
      JWT_SECRET: supersecretjwtkey_changeme_in_production_2024
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      NODE_ENV: production
      ADMIN_EMAIL: admin@chairfactory.com
      ADMIN_PASSWORD: Admin@1234
      ADMIN_NAME: Factory Admin
      FRONTEND_URL: http://localhost:5173
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: chairfactory_client
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  postgres_data:
